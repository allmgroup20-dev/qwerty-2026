<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Login Test</title></head>
<body style="font-family:sans-serif;padding:20px;max-width:400px;margin:auto">
<h2>Login Test (No Service Worker)</h2>
<input id="phone" placeholder="Phone" style="width:100%;padding:8px;margin:4px 0">
<input id="pass" type="password" placeholder="Password" style="width:100%;padding:8px;margin:4px 0">
<button onclick="testLogin()" style="padding:10px 20px;margin:8px 0">Test Login</button>
<pre id="result" style="background:#f4f4f4;padding:10px;margin-top:10px;min-height:100px"></pre>
<script>
async function testLogin() {
  const r = document.getElementById('result');
  r.textContent = 'Loading...';
  const t0 = Date.now();
  try {
    const res = await fetch('/api/auth/worker-login', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({phone: phone.value, password: pass.value})
    });
    const t1 = Date.now();
    const data = await res.json();
    r.textContent = `Status: ${res.status}\nTime: ${t1-t0}ms\nResponse: ${JSON.stringify(data, null, 2)}`;
  } catch(e) {
    r.textContent = `Error: ${e.message}`;
  }
}
</script>
<p style="margin-top:20px;color:#666">Also test Dashboard summar directly:</p>
<button onclick="testSummar()">Test Dashboard Summar API</button>
<div id="summarResult" style="background:#f4f4f4;padding:10px;margin-top:10px;min-height:50px"></div>
<script>
async function testSummar() {
  const wid = localStorage.getItem('worker_id');
  if (!wid) { document.getElementById('summarResult').textContent = 'Please login first'; return; }
  const sr = document.getElementById('summarResult');
  sr.textContent = 'Loading...';
  const t0 = Date.now();
  try {
    const res = await fetch('/api/dashboard/summar?workerId=' + wid);
    const t1 = Date.now();
    const data = await res.json();
    sr.textContent = `Status: ${res.status}, Time: ${t1-t0}ms` + (data.error ? '\nError: ' + data.error : '\nProfile: ' + (data.profile?.name || 'null'));
  } catch(e) {
    sr.textContent = 'Error: ' + e.message;
  }
}
</script>

<p style="margin-top:20px;color:#666">Then test redirect:</p>
<button onclick="testLoginAndRedirect()">Login + Redirect to Dashboard</button>
<script>
async function testLoginAndRedirect() {
  const r = document.getElementById('result');
  r.textContent = 'Loading...';
  try {
    const res = await fetch('/api/auth/worker-login', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({phone: phone.value, password: pass.value})
    });
    const data = await res.json();
    if (data.token) {
      localStorage.setItem('worker_token', data.token);
      localStorage.setItem('worker_id', data.workerId || '');
      localStorage.setItem('worker_name', data.name || '');
      r.textContent = 'Token received, redirecting...';
      window.location.href = '/dashboard';
    } else {
      r.textContent = `Error: ${data.error || 'Login failed'}`;
    }
  } catch(e) {
    r.textContent = `Error: ${e.message}`;
  }
}
</script>
</body>
</html>
